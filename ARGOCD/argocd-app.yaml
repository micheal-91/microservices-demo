apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-boutique
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ' https://github.com/micheal-91/microservices-demo.git'
    targetRevision: HEAD
    path: kustomize # Points to the folder containing your Kustomize files
  destination:
    server: 'https://kubernetes.default.svc' # Deploys straight to your local RKE2 cluster
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
