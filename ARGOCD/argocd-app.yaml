apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-boutique
  namespace: argocd
spec:
  project: default
  source:
    repoURL:  https://github.com/micheal-91/microservices-demo.git
    targetRevision: main
    # path: kubernetes-manifests # this when use Kustomize it will check it 
    path: . # when use skaffold only changes vi test-hydratedOld.yaml
    directory:
      include: 'test-hydratedOld.yaml'
     
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
